[package]
name = "bf"
version = "0.1.0"
edition = "2024"

[features]
default = ["cli", "testing"]

# Enable the CLI interface.
cli = ["dep:clap", "dep:pretty_env_logger"]

# Enable the experimental LLVM backend (usage of this is discoraged).
llvm = ["dep:inkwell"]

# Tools for testing.
testing = []

[[bin]]
name = "bf"
path = "src/main.rs"
required-features = ["cli"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"], optional = true }
cranelift = "0.129.1"
cranelift-codegen = { version = "0.129.1", features = ["capstone", "core", "disas", "isle-errors", "x86"] }
cranelift-jit = "0.129.1"
cranelift-module = "0.129.1"
cranelift-native = "0.129.1"
cranelift-object = "0.129.1"
inkwell = { version = "0.8.0", features = ["llvm21-1"], optional = true }
log = "0.4.29"
pretty_env_logger = { version = "0.5.0", optional = true }
ron = "0.12.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_stacker = "0.1.14"
target-lexicon = "0.13.5"
tempfile = "3.26.0"
which = "8.0.0"

[target.'cfg(target_os = "windows")'.dependencies]
lnk = "0.6.3"

[dev-dependencies]
criterion = "0.8.2"
dir-test = "0.4.1"

[[bench]]
name = "interpret"
path = "benches/interpret.rs"
harness = false

[[bench]]
name = "parse"
path = "benches/parse.rs"
harness = false

[[bench]]
name = "optim"
path = "benches/optim.rs"
harness = false
