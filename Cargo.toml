[package]
name = "bf"
version = "0.1.0"
edition = "2024"

[features]
default = ["cli", "testing", "wasm", "cranelift"]

# Enable the CLI interface.
cli = ["dep:clap", "dep:pretty_env_logger"]

# Tools for testing.
testing = []

# Support AOT & JIT compilation with Cranelift
cranelift = ["dep:cranelift", "dep:cranelift-codegen", "dep:cranelift-jit", "dep:cranelift-module", "dep:cranelift-native", "dep:cranelift-object", "dep:target-lexicon", "dep:lnk", "dep:which"]

# Support WASM interop
wasm = ["dep:wasm-bindgen", "dep:js-sys", "dep:wasm-bindgen-futures"]

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "bf"
path = "src/main.rs"
required-features = ["cli"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"], optional = true }
cranelift = { version = "0.129.1", optional = true }
cranelift-codegen = { version = "0.129.1", optional = true, features = ["capstone", "core", "disas", "isle-errors", "x86"] }
cranelift-jit = { version = "0.129.1", optional = true }
cranelift-module = { version = "0.129.1", optional = true }
cranelift-native = { version = "0.129.1", optional = true }
cranelift-object = { version = "0.129.1", optional = true }
js-sys = { version = "0.3.91", optional = true }
log = "0.4.29"
pretty_env_logger = { version = "0.5.0", optional = true }
ron = "0.12.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_stacker = "0.1.14"
target-lexicon = { version = "0.13.5", optional = true }
tempfile = "3.26.0"
wasm-bindgen = { version = "0.2.114", optional = true }
wasm-bindgen-futures = { version = "0.4.64", optional = true }
wasm-encoder = "0.245.1"
wasmparser = "0.245.1"
which = { version = "8.0.1", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
lnk = { version = "0.6.3", optional = true }

[dev-dependencies]
criterion = "0.8.2"
dir-test = "0.4.1"
paste = "1.0.15"

[[bench]]
name = "interpret"
path = "benches/interpret.rs"
harness = false

[[bench]]
name = "parse"
path = "benches/parse.rs"
harness = false

[[bench]]
name = "optim"
path = "benches/optim.rs"
harness = false

[[bench]]
name = "jit"
path = "benches/jit.rs"
harness = false
required-features = ["cranelift"]

[profile.bench]
debug = true
