[package]
name = "bf"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
cranelift = "0.129.1"
cranelift-codegen = { version = "0.129.1", features = ["capstone", "disas"] }
cranelift-jit = "0.129.1"
cranelift-module = "0.129.1"
cranelift-native = "0.129.1"
cranelift-object = "0.129.1"
log = "0.4.29"
pretty_env_logger = "0.5.0"
ron = "0.12.0"
serde = { version = "1.0.228", features = ["derive"] }
target-lexicon = "0.13.5"
tempfile = "3.26.0"
which = "8.0.0"

[target.'cfg(target_os = "windows")'.dependencies]
lnk = "0.6.3"

[dev-dependencies]
criterion = "0.8.2"
dir-test = "0.4.1"

[[bench]]
name = "interpret"
path = "benches/interpret.rs"
harness = false

[[bench]]
name = "parse"
path = "benches/parse.rs"
harness = false
